<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>SAKURAIN TECH</title>
    <script>
      // 单页应用路由重定向
      // 将路径保存到 sessionStorage，然后重定向到首页
      sessionStorage.setItem('spa-redirect', location.pathname + location.search + location.hash);
      location.replace('/');
    </script>
  </head>
  <body>
    <p>正在跳转...</p>
  </body>
</html>
