<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="#0f172a"/>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="bg-glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </linearGradient>
  </defs>
  
  <!-- Background glow -->
  <circle cx="200" cy="150" r="120" fill="url(#bg-glow)"/>
  
  <!-- Trophy base -->
  <ellipse cx="200" cy="230" rx="60" ry="15" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <rect x="170" y="200" width="60" height="35" rx="4" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  
  <!-- Trophy cup -->
  <path d="M140 100 Q140 180 200 180 Q260 180 260 100" fill="url(#gold)" stroke="#f59e0b" stroke-width="3"/>
  <ellipse cx="200" cy="100" rx="60" ry="15" fill="#fcd34d" stroke="#f59e0b" stroke-width="2"/>
  
  <!-- Trophy handles -->
  <path d="M140 110 Q120 110 120 140 Q120 170 145 160" fill="none" stroke="#fbbf24" stroke-width="4" stroke-linecap="round"/>
  <path d="M260 110 Q280 110 280 140 Q280 170 255 160" fill="none" stroke="#fbbf24" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Star decoration -->
  <path d="M200 60 L205 75 L220 75 L208 85 L213 100 L200 90 L187 100 L192 85 L180 75 L195 75 Z" fill="#fef3c7" stroke="#fbbf24" stroke-width="2"/>
  
  <!-- Text -->
  <text x="200" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#fbbf24">全国冠军</text>
  <text x="200" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">2024 计算机博弈大赛</text>
</svg>